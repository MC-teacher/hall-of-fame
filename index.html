<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 수행평가 명예의 전당</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold:#FFD700; --gold-dark:#B8860B; --bg:#0A0A12; --surface:#12121E; --text:#F0E6FF; --muted:#8888AA; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px); pointer-events:none; z-index:9999; }
  body::after  { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%); pointer-events:none; z-index:9998; }
  #header { position:fixed; top:0; left:0; right:0; height:90px; background:linear-gradient(90deg,var(--surface) 0%,#1e1040 50%,var(--surface) 100%); border-bottom:2px solid var(--gold-dark); display:flex; align-items:center; justify-content:space-between; padding:0 40px; z-index:100; }
  .header-left { display:flex; align-items:center; gap:18px; }
  .trophy-icon { font-size:42px; animation:float 3s ease-in-out infinite; filter:drop-shadow(0 0 12px rgba(255,215,0,0.8)); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .header-title h1 { font-family:'Black Han Sans',sans-serif; font-size:28px; color:var(--gold); letter-spacing:2px; text-shadow:0 0 20px rgba(255,215,0,0.5); line-height:1.1; }
  .header-title p  { font-size:13px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .live-badge { display:flex; align-items:center; gap:8px; background:rgba(220,38,38,0.15); border:1px solid rgba(220,38,38,0.5); border-radius:20px; padding:5px 14px; font-size:13px; font-weight:700; color:#FF6B6B; letter-spacing:2px; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:#FF4444; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  #clock { font-size:13px; color:var(--muted); letter-spacing:1px; }
  #ticker { position:fixed; bottom:0; left:0; right:0; height:48px; background:linear-gradient(90deg,var(--gold-dark),#c8960c,var(--gold-dark)); display:flex; align-items:center; overflow:hidden; z-index:100; }
  .ticker-label { background:#000; color:var(--gold); font-family:'Black Han Sans',sans-serif; font-size:15px; padding:0 20px; height:100%; display:flex; align-items:center; white-space:nowrap; flex-shrink:0; border-right:2px solid rgba(255,255,255,0.2); }
  .ticker-track { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
  .ticker-inner { display:flex; gap:60px; white-space:nowrap; animation:ticker-scroll 30s linear infinite; font-size:15px; font-weight:700; color:#000; }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item::before { content:'⭐ '; }
  #stage { position:fixed; inset:90px 0 48px 0; display:flex; flex-direction:column; }
  #main-display { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
  #main-video { width:100%; height:100%; object-fit:contain; display:block; }
  #loading-spinner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none; flex-direction:column; align-items:center; gap:12px; }
  #loading-spinner.show { display:flex; }
  .spinner-ring { width:48px; height:48px; border:3px solid rgba(255,215,0,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner-text { font-size:13px; color:var(--muted); letter-spacing:2px; }
  .video-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.85)); padding:40px 40px 24px; display:flex; align-items:flex-end; justify-content:space-between; pointer-events:none; }
  .video-number { font-size:12px; color:var(--gold); letter-spacing:3px; font-weight:700; margin-bottom:6px; }
  .video-name   { font-family:'Black Han Sans',sans-serif; font-size:36px; color:#fff; text-shadow:0 2px 20px rgba(0,0,0,0.8); letter-spacing:2px; }
  .video-stars  { font-size:22px; letter-spacing:4px; margin-top:6px; filter:drop-shadow(0 0 6px rgba(255,215,0,0.8)); }
  .video-badge  { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; font-family:'Black Han Sans',sans-serif; font-size:16px; padding:10px 22px; border-radius:4px; text-align:center; line-height:1.3; box-shadow:0 4px 20px rgba(255,215,0,0.4); }
  #progress-bar-container { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.15); }
  #progress-bar { height:100%; background:linear-gradient(90deg,var(--gold-dark),var(--gold)); width:0%; }
  #rail { height:130px; background:var(--surface); border-top:1px solid rgba(255,215,0,0.2); display:flex; align-items:center; padding:12px 20px; gap:12px; overflow:hidden; }
  .thumb { flex-shrink:0; width:160px; height:106px; border-radius:6px; overflow:hidden; cursor:pointer; position:relative; border:2px solid transparent; transition:border-color 0.3s,transform 0.2s; background:#000; }
  .thumb video { width:100%; height:100%; object-fit:cover; opacity:0.7; transition:opacity 0.3s; pointer-events:none; }
  .thumb:hover video { opacity:0.9; }
  .thumb.active { border-color:var(--gold); transform:translateY(-3px); box-shadow:0 6px 24px rgba(255,215,0,0.3); }
  .thumb.active video { opacity:1; }
  .thumb-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.85)); color:#fff; font-size:12px; font-weight:700; letter-spacing:1px; padding:16px 8px 6px; text-align:center; }
  .thumb.active .thumb-label { color:var(--gold); }
  .thumb-number { position:absolute; top:6px; left:8px; font-size:10px; color:var(--gold); font-weight:700; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:3px; }
  #transition-overlay { position:fixed; inset:0; background:#000; z-index:500; opacity:0; pointer-events:none; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; transition:opacity 0.3s; }
  #transition-overlay.active { opacity:1; pointer-events:all; }
  .transition-trophy { font-size:64px; filter:drop-shadow(0 0 30px rgba(255,215,0,0.9)); }
  .transition-text { font-family:'Black Han Sans',sans-serif; font-size:32px; color:var(--gold); letter-spacing:3px; text-shadow:0 0 30px rgba(255,215,0,0.8); }
  .star-particle { position:fixed; pointer-events:none; font-size:20px; animation:star-fall 3s ease-in forwards; z-index:200; }
  @keyframes star-fall { 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(200px) rotate(360deg)} }
</style>
</head>
<body>
<div id="header">
  <div class="header-left">
    <div class="trophy-icon">🏆</div>
    <div class="header-title">
      <h1>수행평가 명예의 전당</h1>
      <p>Hall of Excellence · Student Works · 2025</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div id="clock">--:--:--</div>
  </div>
</div>
<div id="stage">
  <div id="main-display">
    <video id="main-video" autoplay muted playsinline></video>
    <div id="loading-spinner"><div class="spinner-ring"></div><div class="spinner-text">불러오는 중...</div></div>
    <div class="video-overlay">
      <div class="video-title-block">
        <div class="video-number" id="video-number">NO. 1 / 7</div>
        <div class="video-name" id="video-name">작품명</div>
        <div class="video-stars">⭐⭐⭐⭐⭐</div>
      </div>
      <div class="video-badge">우수작품<br>선정</div>
    </div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
  </div>
  <div id="rail"></div>
</div>
<div id="ticker">
  <div class="ticker-label">📢 명예의 전당</div>
  <div class="ticker-track"><div class="ticker-inner" id="ticker-inner"></div></div>
</div>
<div id="transition-overlay">
  <div class="transition-trophy">🏆</div>
  <div class="transition-text" id="transition-text">다음 작품</div>
</div>
<script>
const videos = [
  { file:'sikye.mp4',     name:'시계'   },
  { file:'baegu.webm',    name:'배구'   },
  { file:'mulge.mp4',     name:'물개'   },
  { file:'jjangu.mp4',    name:'짱구'   },
  { file:'kamera.mp4',    name:'카메라' },
  { file:'mulbyung.webm', name:'물병'   },
  { file:'kamera2.mp4',  name:'카메라2' },
];
let currentIndex = 0, isTransitioning = false, autoAdvanceTimer = null;
const mainVideo = document.getElementById('main-video');
const progressBar = document.getElementById('progress-bar');
const rail = document.getElementById('rail');
const overlay = document.getElementById('transition-overlay');
const spinner = document.getElementById('loading-spinner');

videos.forEach((v, i) => {
  const thumb = document.createElement('div');
  thumb.className = 'thumb' + (i===0?' active':'');
  const num = document.createElement('div'); num.className='thumb-number'; num.textContent='No.'+(i+1);
  const vid = document.createElement('video'); vid.src=v.file; vid.muted=true; vid.preload='metadata';
  const label = document.createElement('div'); label.className='thumb-label'; label.textContent=v.name;
  thumb.appendChild(num); thumb.appendChild(vid); thumb.appendChild(label);
  thumb.addEventListener('click', () => switchTo(i));
  thumb.addEventListener('mouseenter', () => { if(i!==currentIndex) vid.play(); });
  thumb.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime=0; });
  rail.appendChild(thumb);
});

const msgs = [...videos.map(v=>v.name+' — 수행평가 우수작품 선정'), '이 작품들은 학생들의 창의력과 노력의 결실입니다','수고한 모든 학생들에게 박수를','명예의 전당에 영원히 기록됩니다'];
document.getElementById('ticker-inner').innerHTML = [...msgs,...msgs].map(m=>'<span class="ticker-item">'+m+'</span>').join('');

function spawnStars() {
  for(let i=0;i<8;i++) {
    const s=document.createElement('div'); s.className='star-particle';
    s.textContent=['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*60+20+'vh';
    s.style.animationDelay=Math.random()+'s';
    document.body.appendChild(s); setTimeout(()=>s.remove(),3500);
  }
}

function resetAutoAdvance() {
  clearTimeout(autoAdvanceTimer);
  const dur = mainVideo.duration;
  // ended 이벤트 백업용: 영상 길이 + 3초 여유만 줌
  const delay = (dur && !isNaN(dur) && dur > 0) ? (dur * 1000 + 3000) : 60000;
  autoAdvanceTimer = setTimeout(() => {
    if (!isTransitioning) switchTo((currentIndex+1) % videos.length);
  }, delay);
}

function switchTo(index) {
  if (isTransitioning) return;
  isTransitioning = true;
  clearTimeout(autoAdvanceTimer);
  document.getElementById('transition-text').textContent = videos[index].name;
  overlay.classList.add('active');
  spawnStars();
  setTimeout(() => {
    currentIndex = index;
    const v = videos[index];
    spinner.classList.add('show');
    progressBar.style.width = '0%';
    mainVideo.src = v.file;
    mainVideo.load();
    document.getElementById('video-number').textContent = 'No. '+(index+1)+' / '+videos.length;
    document.getElementById('video-name').textContent = v.name;
    document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===index));
    setTimeout(() => { overlay.classList.remove('active'); isTransitioning = false; }, 600);
  }, 900);
}

mainVideo.addEventListener('canplay', () => {
  spinner.classList.remove('show');
  mainVideo.play().catch(()=>{});
  resetAutoAdvance();
});
mainVideo.addEventListener('loadedmetadata', () => resetAutoAdvance());
mainVideo.addEventListener('playing', () => spinner.classList.remove('show'));
mainVideo.addEventListener('waiting', () => spinner.classList.add('show'));

mainVideo.addEventListener('timeupdate', () => {
  if (!mainVideo.duration) return;
  progressBar.style.width = (mainVideo.currentTime / mainVideo.duration * 100) + '%';
});

mainVideo.addEventListener('ended', () => {
  clearTimeout(autoAdvanceTimer);
  switchTo((currentIndex+1) % videos.length);
});

mainVideo.addEventListener('error', () => {
  spinner.classList.remove('show');
  clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => switchTo((currentIndex+1) % videos.length), 2000);
});

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false});
}, 1000);

switchTo(0);
</script>
</body>
</html>
